<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob: 'unsafe-inline' 'unsafe-eval'; media-src * blob: data: mediastream:; img-src 'self' data: blob: content:; connect-src 'self' data: blob:;">
    <title>UNEJ Heritage AR</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
        body { background-color:#083478; color:#fff; display:flex; justify-content:center; align-items:center; min-height:100vh; overflow:hidden; }
        .mobile-container { width:100%; max-width:480px; height:100vh; display:flex; flex-direction:column; align-items:center; padding:10vh 20px 5vh; text-align:center; position:relative; }
        .logo-box { background:#fff; padding:10px; border:3px solid #F4D03F; width:140px; height:140px; display:flex; justify-content:center; align-items:center; margin-bottom:6vh; border-radius:8px; }
        .logo-box img { max-width:100%; max-height:100%; object-fit:contain; }
        .header-title { display:flex; align-items:center;12px; margin-bottom:8vh; }
        .header-title h1 { font-size:22px; font-weight:700; letter-spacing:.5px; }
        .subtitle { font-size:16px; line-height:1.6; color:#d1d9e6; letter-spacing:1px; font-weight:400; flex-grow:1; }
        .btn-explore { background:#F8C51C; color:#083478; border:none; padding:16px 20px; width:100%; max-width:280px; font-size:15px; font-weight:800; letter-spacing:.5px; display:flex; justify-content:center; align-items:center;10px; cursor:pointer; border-radius:8px; margin-bottom:8vh; }
        .btn-explore:active { transform:scale(.98); }
        .footer { font-size:12px; color:#a0b2ce; line-height:1.4; }
    </style>
</head>
<body>
    <div class="mobile-container">
        <div class="logo-box">
            <img src="img/logo-unej.png" alt="Logo Universitas Jember">
        </div>
        <div class="header-title">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 9H22L12 2ZM3 11V20H5V11H3ZM7 11V20H9V11H7ZM11 11V20H13V11H11ZM15 11V20H17V11H15ZM19 11V20H21V11H19ZM2 21V23H22V21H2Z"/>
            </svg>
            <h1>UNEJ Heritage AR</h1>
        </div>
        <div class="subtitle">UNEJ BUILDING<br>&amp;<br>HISTORY</div>
        <button class="btn-explore" onclick="App.go('beranda.html')">
            MULAI JELAJAH
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#083478" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
        <div class="footer">&copy; 2026 Universitas<br>Jember</div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
