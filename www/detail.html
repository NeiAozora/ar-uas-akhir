<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob: 'unsafe-inline' 'unsafe-eval'; media-src * blob: data: mediastream:; img-src 'self' data: blob: content:; connect-src 'self' data: blob:;">
    <title>Detail Gedung - UNEJ Heritage AR</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
        body { background:#f4f6f8; color:#333; display:flex; justify-content:center; }
        .app-container { width:100%; max-width:480px; background:#fff; min-height:100vh; position:relative; box-shadow:0 0 15px rgba(0,0,0,.1); overflow-x:hidden; padding-bottom:80px; }
        .hero-section { position:relative; width:100%; height:300px; background-size:cover; background-position:center; }
        .hero-overlay { position:absolute; bottom:0; left:0; width:100%; height:60%; background:linear-gradient(to bottom,rgba(2,52,116,0),rgba(2,52,116,.9)); display:flex; flex-direction:column; justify-content:flex-end; padding:20px; }
        .back-button { position:absolute; top:20px; left:20px; width:40px; height:40px; background:rgba(255,255,255,.2); backdrop-filter:blur(5px); border-radius:50%; display:flex; justify-content:center; align-items:center; color:#fff; cursor:pointer; z-index:10; }
        .hero-tag { background:#023474; color:#fff; font-size:11px; font-weight:700; padding:4px 12px; border-radius:4px; align-self:flex-start; margin-bottom:8px; }
        .hero-title { color:#fff; font-size:24px; font-weight:800; margin-bottom:6px; }
        .hero-location { color:#e2eafc; font-size:13px; display:flex; align-items:center;6px; }
        .detail-content { padding:24px 20px; background:#fff; }
        .info-grid { display:grid; grid-template-columns:1fr 1fr;16px; margin-bottom:24px; }
        .info-card { border:1px solid #eaeaea; border-radius:8px; padding:16px; display:flex; flex-direction:column;8px; }
        .info-card-header { display:flex; align-items:center;8px; color:#4a5568; font-size:12px; font-weight:500; }
        .info-card-value { font-size:16px; font-weight:700; color:#1a202c; }
        .section-title { font-size:18px; font-weight:700; color:#1a202c; margin-bottom:12px; margin-top:24px; }
        .section-text { font-size:13px; line-height:1.6; color:#4a5568; }
        .architecture-card { border:1px solid #eaeaea; border-radius:8px; padding:16px; margin-bottom:12px; }
        .architecture-card-header { display:flex; align-items:center;10px; margin-bottom:8px; }
        .architecture-card-header h4 { font-size:14px; font-weight:700; color:#1a202c; }
        .trivia-list { display:flex; flex-direction:column;12px; margin-bottom:24px; }
        .trivia-item { display:flex;12px; align-items:flex-start; }
        .trivia-icon { color:#023474; flex-shrink:0; margin-top:2px; }
        .trivia-text { font-size:13px; line-height:1.5; color:#4a5568; }
        .btn-primary { width:100%; background:#023474; color:#fff; border:none; padding:16px; border-radius:8px; font-size:15px; font-weight:700; display:flex; justify-content:center; align-items:center;10px; cursor:pointer; margin-top:24px; margin-bottom:24px; }
        .nearby-section { padding:0 20px 20px; border-top:1px solid #eaeaea; padding-top:24px; }
        .nearby-scroll { display:flex;16px; overflow-x:auto; scroll-snap-type:x mandatory; -ms-overflow-style:none; scrollbar-width:none; padding-bottom:10px; }
        .nearby-scroll::-webkit-scrollbar { display:none; }
        .nearby-card { min-width:140px; border-radius:8px; overflow:hidden; border:1px solid #eaeaea; scroll-snap-align:start; cursor:pointer; }
        .nearby-card img { width:100%; height:90px; object-fit:cover; }
        .nearby-info { padding:10px; }
        .nearby-info h4 { font-size:13px; font-weight:700; color:#1a202c; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
        .nearby-info p { font-size:11px; color:#718096; }
        .bottom-nav { position:fixed; bottom:0; width:100%; max-width:480px; background:#fff; border-top:1px solid #eaeaea; display:flex; justify-content:space-between; padding:10px 20px; padding-bottom:env(safe-area-inset-bottom,10px); z-index:100; }
        .nav-item { display:flex; flex-direction:column; align-items:center;4px; text-decoration:none; color:#718096; font-size:11px; font-weight:500; width:60px; cursor:pointer; }
        .nav-icon-box { width:48px; height:32px; display:flex; justify-content:center; align-items:center; border-radius:16px; }
        .nav-item.active { color:#023474; font-weight:600; }
        .nav-item.active .nav-icon-box { background:#e2eafc; }
        .nav-item.active svg { stroke:#023474; fill:transparent; }
    </style>
</head>
<body>
    <div class="app-container">
        <section class="hero-section" id="hero">
            <div class="back-button" onclick="history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </div>
            <div class="hero-overlay">
                <span class="hero-tag" id="hero-tag"></span>
                <h1 class="hero-title" id="hero-title"></h1>
                <div class="hero-location">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2ZM12 11.5C10.62 11.5 9.5 10.38 9.5 9C9.5 7.62 10.62 6.5 12 6.5C13.38 6.5 14.5 7.62 14.5 9C14.5 10.38 13.38 11.5 12 11.5Z"/></svg>
                    <span id="hero-loc"></span>
                </div>
            </div>
        </section>

        <main class="detail-content">
            <div class="info-grid">
                <div class="info-card">
                    <div class="info-card-header">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#023474" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon><circle cx="12" cy="12" r="10"></circle></svg>
                        Gaya
                    </div>
                    <div class="info-card-value" id="info-style"></div>
                </div>
                <div class="info-card">
                    <div class="info-card-header">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#023474" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        Usia
                    </div>
                    <div class="info-card-value" id="info-age"></div>
                </div>
            </div>

            <h3 class="section-title" style="margin-top:0;">Sejarah</h3>
            <p class="section-text" id="history"></p>

            <h3 class="section-title">Arsitektur</h3>
            <div id="architecture"></div>

            <h3 class="section-title">Trivia</h3>
            <div class="trivia-list" id="trivia"></div>

            <button class="btn-primary" onclick="App.go('scan.html')">
                Buka Pengalaman AR
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h4v4H4zM16 4h4v4h-4zM4 16h4v4H4zM12 12h.01M16 16h.01M16 20h.01M20 16h.01M20 20h.01M12 16h.01M12 20h.01"/></svg>
            </button>
        </main>

        <section class="nearby-section">
            <h3 class="section-title" style="margin-top:0;">Warisan Sekitar</h3>
            <div class="nearby-scroll" id="nearby"></div>
        </section>

        <nav class="bottom-nav">
            <a class="nav-item" onclick="App.go('beranda.html')"><div class="nav-icon-box"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></div><span>Beranda</span></a>
            <a class="nav-item active" onclick="App.go('scan.html')"><div class="nav-icon-box"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h4v4H4zM16 4h4v4h-4zM4 16h4v4H4zM12 12h.01M16 16h.01M16 20h.01M20 16h.01M20 20h.01M12 16h.01M12 20h.01"/></svg></div><span>Pindai</span></a>
            <a class="nav-item" onclick="App.go('daftar.html')"><div class="nav-icon-box"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16M4 6v.01M4 12v.01M4 18v.01"/></svg></div><span>Daftar</span></a>
            <a class="nav-item" onclick="App.go('tentang.html')"><div class="nav-icon-box"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg></div><span>Tentang</span></a>
        </nav>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        App.onReady(function () {
            var b = DB.byId(App.param("id")) || DB.all()[0];
            var now = new Date().getFullYear();

            document.getElementById("hero").style.backgroundImage = "url('" + b.image + "')";
            document.getElementById("hero-tag").textContent = "Berdiri Sejak " + b.year;
            document.getElementById("hero-title").textContent = b.name;
            document.getElementById("hero-loc").textContent = b.location;
            document.getElementById("info-style").innerHTML = b.style.replace(" ", "<br>");
            document.getElementById("info-age").textContent = (now - b.year) + " Tahun";
            document.getElementById("history").textContent = b.history;

            var icoBuilding = '<svg width="18" height="18" viewBox="0 0 24 24" fill="#023474"><path d="M12 2L2 9H22L12 2ZM3 11V20H5V11H3ZM7 11V20H9V11H7ZM11 11V20H13V11H11ZM15 11V20H17V11H15ZM19 11V20H21V11H19ZM2 21V23H22V21H2Z"/></svg>';
            document.getElementById("architecture").innerHTML = b.architecture.map(function (a) {
                return '<div class="architecture-card"><div class="architecture-card-header">' + icoBuilding +
                       '<h4>' + a.title + '</h4></div><p class="section-text">' + a.text + '</p></div>';
            }).join("");

            var icoBulb = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M9 21C9 21.55 9.45 22 10 22H14C14.55 22 15 21.55 15 21V20H9V21ZM12 2C8.14 2 5 5.14 5 9C5 11.38 6.19 13.47 8 14.74V17C8 17.55 8.45 18 9 18H15C15.55 18 16 17.55 16 17V14.74C17.81 13.47 19 11.38 19 9C19 5.14 15.86 2 12 2Z"/></svg>';
            document.getElementById("trivia").innerHTML = b.trivia.map(function (t) {
                return '<div class="trivia-item"><div class="trivia-icon">' + icoBulb +
                       '</div><p class="trivia-text">' + t + '</p></div>';
            }).join("");

            var distances = ["250m", "400m", "500m", "650m"];
            document.getElementById("nearby").innerHTML = b.nearby.map(function (id, i) {
                var n = DB.byId(id); if (!n) return "";
                return '<div class="nearby-card" onclick="App.goDetail(\'' + n.id + '\')">' +
                       '<img src="' + n.image + '" alt="' + n.name + '">' +
                       '<div class="nearby-info"><h4>' + n.name + '</h4><p>' + (distances[i] || "—") + ' jauhnya</p></div></div>';
            }).join("");
        });
    </script>
</body>
</html>
